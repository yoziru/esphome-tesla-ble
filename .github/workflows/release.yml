name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Explicit version override (X.Y.Z)
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Run releases from main only" >&2
            exit 1
          fi

      - name: Require release token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "Set RELEASE_TOKEN in the protected 'release' environment" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Run release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          release_arg="$INPUT_VERSION"
          if [ -z "$release_arg" ]; then
            release_arg="$INPUT_BUMP"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$release_arg"
