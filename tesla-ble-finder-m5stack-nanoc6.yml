# Tesla BLE Finder - M5Stack NanoC6
# Use this to discover your vehicle's BLE MAC address.
# After finding it, delete this device and import the main config for your board.
external_components: !include packages/external_components.yml

packages:
  base: !include packages/base.yml
  device_base: !include boards/m5stack-nanoc6.yml

tesla_ble_listener:
  vin: !secret tesla_vin

dashboard_import:
  package_import_url: github://yoziru/esphome-tesla-ble/tesla-ble-finder-m5stack-nanoc6.dashboard.yml
